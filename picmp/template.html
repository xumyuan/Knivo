<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0c0c14">
<title>picmp - 图像质量对比报告</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root {
  --bg-0: #0c0c14; --bg-1: #13131d; --bg-2: #1a1a26; --bg-3: #222230;
  --border: rgba(255,255,255,0.06); --border-h: rgba(255,255,255,0.12);
  --t1: #eeeef2; --t2: #88889a; --t3: #55556a;
  --accent: #7b93f3; --accent-dim: rgba(123,147,243,0.10);
  --good: #34d399; --warn: #fbbf24; --bad: #f87171;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg-0); color: var(--t1);
  font-family: 'Inter', -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
  display: flex; flex-direction: column; user-select: none;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}

/* ===== 顶栏 ===== */
.topbar {
  flex-shrink: 0; display: flex; align-items: center; gap: 12px;
  padding: 6px 16px; background: var(--bg-1); border-bottom: 1px solid var(--border);
}
.nav-group { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: transparent; color: var(--t2); border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 8px; cursor: pointer;
  font: 500 12px/1 'Inter', sans-serif; white-space: nowrap;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.nav-btn:hover { color: var(--t1); background: var(--accent-dim); border-color: var(--border-h); }
.nav-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.nav-info { text-align: center; width: 200px; }
.nav-info .counter { font: 600 13px/1.3 'Inter', sans-serif; font-variant-numeric: tabular-nums; }
.nav-info .filename { color: var(--t3); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kbd-hint { color: var(--t3); font-size: 10px; white-space: nowrap; }
.kbd-hint kbd {
  display: inline-block; background: var(--bg-3); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 4px; font: 500 9px/1.3 'Inter', sans-serif; color: var(--t2);
}

/* pill */
.pill-group { display: flex; align-items: center; gap: 4px; margin-left: auto; }
.pill-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
.pill-label { color: var(--t3); font: 500 10px/1 'Inter', sans-serif; margin-right: 2px; }
.pill {
  font: 500 11px/1 'Inter', sans-serif; color: var(--t3);
  background: transparent; border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 9px; cursor: pointer; white-space: nowrap;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
}
.pill:hover { color: var(--t2); border-color: var(--border-h); }
.pill.active { color: var(--t1); background: var(--accent-dim); border-color: rgba(123,147,243,0.3); }
.pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

/* ===== 主内容：上下两行 ===== */
.main { flex: 1; display: flex; flex-direction: column; padding: 6px; gap: 6px; min-height: 0; }
.row-top, .row-bot { display: grid; gap: 6px; min-height: 0; overflow: hidden; }
.row-top { flex: 1; }
.row-bot { flex: 1; }
.row-bot.hidden { display: none; }
.row-top.hidden { display: none; }

/* 拖拽分割条 */
.splitter {
  flex-shrink: 0; height: 6px; cursor: row-resize;
  display: flex; align-items: center; justify-content: center;
}
.splitter.hidden { display: none; }
.splitter-handle {
  width: 36px; height: 2px; border-radius: 2px;
  background: rgba(255,255,255,0.06); transition: background 0.15s, width 0.15s;
}
.splitter:hover .splitter-handle, .splitter.active .splitter-handle {
  background: var(--accent); width: 56px;
}
body.resizing { cursor: row-resize; }
body.resizing img { pointer-events: none; }

/* 卡片 */
.panel {
  display: flex; flex-direction: column; min-height: 0;
  background: var(--bg-1); border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border); transition: border-color 0.15s;
}
.panel:hover { border-color: var(--border-h); }
.panel-head {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  color: var(--t2); font: 500 12px/1 'Inter', sans-serif;
  padding: 6px 12px; flex-shrink: 0; letter-spacing: 0.03em;
  border-bottom: 1px solid var(--border); background: var(--bg-2);
}
.panel-head .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.panel-head .dot-blue { background: var(--accent); }
.panel-head .dot-green { background: var(--good); }
.panel-head .dot-yellow { background: var(--warn); }
.panel-body { flex: 1; min-height: 0; display: flex; padding: 4px; }
.panel-body img {
  width: 100%; height: 100%; object-fit: contain; cursor: pointer;
  border-radius: 6px; transition: opacity 0.15s;
}
.panel-body img:hover { opacity: 0.88; }
.panel-head[data-bs-toggle="tooltip"] {
  cursor: help; text-decoration-line: underline; text-decoration-style: dotted;
  text-decoration-color: rgba(255,255,255,0.15); text-underline-offset: 3px;
}

/* 指标面板 */
.metrics-body { flex: 1; overflow-y: auto; padding: 2px 0; }
.m-item {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 14px; transition: background 0.12s;
}
.m-item:hover { background: var(--accent-dim); }
.m-item .m-k {
  color: var(--t2); font: 400 12px/1.4 'Inter', sans-serif;
  cursor: help; text-decoration-line: underline; text-decoration-style: dotted;
  text-decoration-color: rgba(255,255,255,0.12); text-underline-offset: 3px;
}
.m-item .m-v {
  font: 700 17px/1.2 'Inter', sans-serif; font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.m-v-good { color: var(--good); }
.m-v-warn { color: var(--warn); }
.m-v-bad  { color: var(--bad); }
.m-v-info { color: var(--accent); }
.m-sep { height: 1px; background: var(--border); margin: 2px 14px; }

/* 全屏弹窗 */
#fullModal .modal-content {
  background: rgba(0,0,0,0.97); cursor: zoom-out;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
#fullModal img { max-width: 95vw; max-height: 92vh; object-fit: contain; border-radius: 8px; }

/* ===== 像素对比 ===== */
.img-wrap { position: relative; flex: 1; min-height: 0; display: flex; }
.img-wrap canvas.crosshair-layer {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}
.img-wrap img { z-index: 1; }
#pixel-info {
  display: none; position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(15,15,25,0.92); backdrop-filter: blur(8px);
  border: 1px solid var(--border-h); border-radius: 10px;
  padding: 8px 16px; z-index: 60; font: 500 12px/1.6 'Inter', monospace;
  color: var(--t1); white-space: pre; min-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#pixel-info.visible { display: block; }
#pixel-info .px-coord { color: var(--t2); font-size: 11px; margin-bottom: 2px; }
#pixel-info .px-row { display: flex; gap: 6px; align-items: center; }
#pixel-info .px-label { color: var(--t2); min-width: 16px; flex-shrink: 0; font-weight: 600; }
#pixel-info .px-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border-h); flex-shrink: 0; }
#pixel-info .px-vals { font-variant-numeric: tabular-nums; }
#pixel-info .px-diff { color: var(--warn); }

/* 放大镜 */
.magnifier {
  position: absolute; width: 140px; height: 140px; border-radius: 6px;
  border: 1px solid var(--accent); box-shadow: 0 0 12px rgba(0,0,0,0.6);
  pointer-events: none; z-index: 10; display: none;
  overflow: hidden; image-rendering: pixelated;
}
.magnifier canvas { width: 100%; height: 100%; image-rendering: pixelated; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="nav-group">
    <button class="nav-btn" id="btn-prev" onclick="go(-1)" aria-label="上一组">
      <i class="bi bi-chevron-left" aria-hidden="true"></i> 上一组
    </button>
    <div class="nav-info">
      <div class="counter" id="counter">1 / 1</div>
      <div class="filename" id="filename"></div>
    </div>
    <button class="nav-btn" id="btn-next" onclick="go(1)" aria-label="下一组">
      下一组 <i class="bi bi-chevron-right" aria-hidden="true"></i>
    </button>
    <div class="kbd-hint"><kbd>&larr;</kbd> <kbd>&rarr;</kbd></div>
  </div>

  <div class="pill-group">
    <span class="pill-label">上栏</span>
    <button class="pill active" data-row="top" data-panel="card-metrics" onclick="togglePanel(this)">指标</button>
    <button class="pill active" data-row="top" data-panel="card-a" onclick="togglePanel(this)">原图A</button>
    <button class="pill active" data-row="top" data-panel="card-b" onclick="togglePanel(this)">原图B</button>
    <button class="pill" id="pill-pixel" onclick="togglePixelMode(this)">像素对比</button>
    <div class="pill-sep"></div>
    <span class="pill-label">下栏</span>
    <button class="pill active" id="pill-bot-all" onclick="toggleBotAll(this)">全部</button>
    <button class="pill active" data-row="bot" data-panel="card-heatmap" onclick="togglePanel(this)">热力图</button>
    <button class="pill active" data-row="bot" data-panel="card-amplified" onclick="togglePanel(this)">放大差异</button>
    <button class="pill active" data-row="bot" data-panel="card-ssim" onclick="togglePanel(this)">SSIM</button>
  </div>
</div>

<div class="main">
  <div class="row-top" id="row-top">
    <div class="panel" id="card-metrics">
      <div class="panel-head"><span class="dot dot-blue"></span> 对比指标</div>
      <div class="metrics-body" id="metrics"></div>
    </div>
    <div class="panel" id="card-a">
      <div class="panel-head"><span class="dot dot-green"></span> {{LABEL_A}}</div>
      <div class="panel-body"><div class="img-wrap" id="wrap-a"><img id="img-a" src="" alt="原图 A" onclick="openFull(this.src)"><canvas class="crosshair-layer" id="xhair-a"></canvas><div class="magnifier" id="mag-a"><canvas id="mag-cv-a"></canvas></div></div></div>
    </div>
    <div class="panel" id="card-b">
      <div class="panel-head"><span class="dot dot-green"></span> {{LABEL_B}}</div>
      <div class="panel-body"><div class="img-wrap" id="wrap-b"><img id="img-b" src="" alt="原图 B" onclick="openFull(this.src)"><canvas class="crosshair-layer" id="xhair-b"></canvas><div class="magnifier" id="mag-b"><canvas id="mag-cv-b"></canvas></div></div></div>
    </div>
  </div>
  <div class="splitter" id="splitter"><div class="splitter-handle"></div></div>
  <div class="row-bot" id="row-bot">
    <div class="panel" id="card-heatmap">
      <div class="panel-head" data-bs-toggle="tooltip" data-bs-placement="top" data-bs-html="true"
        title="像素绝对差值的颜色编码<br>蓝色 = 差异小 &middot; 红色 = 差异大"><span class="dot dot-yellow"></span> 差异热力图</div>
      <div class="panel-body"><img id="img-heatmap" src="" alt="差异热力图" onclick="openFull(this.src)"></div>
    </div>
    <div class="panel" id="card-amplified">
      <div class="panel-head" data-bs-toggle="tooltip" data-bs-placement="top" data-bs-html="true"
        title="像素差值放大 10 倍显示<br>用于发现肉眼不可见的微小差异<br>纯黑 = 完全相同"><span class="dot dot-yellow"></span> 放大差异 (10&times;)</div>
      <div class="panel-body"><img id="img-amplified" src="" alt="放大差异图" onclick="openFull(this.src)"></div>
    </div>
    <div class="panel" id="card-ssim">
      <div class="panel-head" data-bs-toggle="tooltip" data-bs-placement="top" data-bs-html="true"
        title="基于 SSIM 算法的结构差异图<br>考虑亮度、对比度和结构信息<br>越亮 = 结构差异越大"><span class="dot dot-yellow"></span> SSIM 结构差异</div>
      <div class="panel-body"><img id="img-ssim" src="" alt="SSIM 结构差异图" onclick="openFull(this.src)"></div>
    </div>
  </div>
</div>

<div id="pixel-info">
  <div class="px-coord" id="px-coord"></div>
  <div class="px-row"><span class="px-label" id="px-la">A</span><span class="px-swatch" id="px-sw-a"></span><span class="px-vals" id="px-v-a"></span></div>
  <div class="px-row"><span class="px-label" id="px-lb">B</span><span class="px-swatch" id="px-sw-b"></span><span class="px-vals" id="px-v-b"></span></div>
  <div class="px-row px-diff"><span class="px-label">&Delta;</span><span class="px-swatch" style="visibility:hidden"></span><span class="px-vals" id="px-v-d"></span></div>
</div>

<div class="modal fade" id="fullModal" tabindex="-1" aria-label="全屏查看图片">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content d-flex align-items-center justify-content-center" onclick="closeFull()">
      <img id="overlay-img" src="" alt="全屏预览">
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const DATA = {{PAIRS_JSON}};
let idx = 0, fullModal;

/* ===== 视图切换 ===== */
function togglePanel(btn) {
  btn.classList.toggle("active");
  document.getElementById(btn.dataset.panel).style.display = btn.classList.contains("active") ? "" : "none";
  reflowRow(btn.dataset.row);
  if (btn.dataset.row === "bot") syncBotAll();
  syncTopAll();
}

function toggleBotAll(btn) {
  const botPills = document.querySelectorAll('.pill[data-row="bot"]');
  // 如果当前全部激活 → 全部关闭，否则 → 全部打开
  const allOn = Array.from(botPills).every(function(p) { return p.classList.contains("active"); });
  botPills.forEach(function(p) {
    if (allOn) { p.classList.remove("active"); } else { p.classList.add("active"); }
    document.getElementById(p.dataset.panel).style.display = p.classList.contains("active") ? "" : "none";
  });
  reflowRow("bot");
  syncBotAll();
}

function syncBotAll() {
  const botPills = document.querySelectorAll('.pill[data-row="bot"]');
  const anyOn = Array.from(botPills).some(function(p) { return p.classList.contains("active"); });
  const allBtn = document.getElementById("pill-bot-all");
  if (anyOn) { allBtn.classList.add("active"); } else { allBtn.classList.remove("active"); }
  document.getElementById("row-bot").classList.toggle("hidden", !anyOn);
  syncSplitter();
}

function syncTopAll() {
  const topPills = document.querySelectorAll('.pill[data-row="top"]');
  const anyOn = Array.from(topPills).some(function(p) { return p.classList.contains("active"); });
  document.getElementById("row-top").classList.toggle("hidden", !anyOn);
  syncSplitter();
}

function syncSplitter() {
  const topVisible = !document.getElementById("row-top").classList.contains("hidden");
  const botVisible = !document.getElementById("row-bot").classList.contains("hidden");
  document.getElementById("splitter").classList.toggle("hidden", !(topVisible && botVisible));
}

function reflowRow(row) {
  const container = document.getElementById("row-" + row);
  const visible = container.querySelectorAll('.panel:not([style*="display: none"])');
  container.style.gridTemplateColumns = visible.length ? "repeat(" + visible.length + ", 1fr)" : "";
}

/* ===== 指标色值分级 ===== */
function gradeMetric(k, v) {
  if (v === null) return "m-v-info";
  if (k === "PSNR (dB)") return v > 40 ? "m-v-good" : v > 30 ? "m-v-warn" : "m-v-bad";
  if (k === "SSIM") return v > 0.99 ? "m-v-good" : v > 0.95 ? "m-v-warn" : "m-v-bad";
  if (k === "MSE") return v < 10 ? "m-v-good" : v < 100 ? "m-v-warn" : "m-v-bad";
  if (k === "MAE") return v < 2 ? "m-v-good" : v < 10 ? "m-v-warn" : "m-v-bad";
  if (k.startsWith("Histogram")) return v > 0.99 ? "m-v-good" : v > 0.95 ? "m-v-warn" : "m-v-bad";
  if (k.startsWith("Pixel Diff")) return v < 1 ? "m-v-good" : v < 5 ? "m-v-warn" : "m-v-bad";
  return "m-v-info";
}

const TIPS = {
  "PSNR (dB)": "Peak Signal-to-Noise Ratio\n越高越好\n>40 dB 几乎无差异\n30~40 轻微差异\n<30 差异明显",
  "SSIM": "Structural Similarity Index\n范围 0~1，越接近 1 越好\n>0.99 极好 · >0.95 良好 · <0.9 差异大",
  "MSE": "Mean Squared Error\n均方误差，越小越好\n0 = 完全相同",
  "MAE": "Mean Absolute Error\n平均绝对误差，越小越好\n0 = 完全相同",
  "Histogram Corr (B)": "Blue Channel\n直方图相关性，1 = 完全一致",
  "Histogram Corr (G)": "Green Channel\n直方图相关性，1 = 完全一致",
  "Histogram Corr (R)": "Red Channel\n直方图相关性，1 = 完全一致",
};

/* ===== 核心 ===== */
document.addEventListener("DOMContentLoaded", function() {
  fullModal = new bootstrap.Modal(document.getElementById("fullModal"));
  document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function(el) {
    new bootstrap.Tooltip(el, { trigger: "hover", container: "body" });
  });
  reflowRow("top"); reflowRow("bot");
  show(0);
});

function openFull(src) { document.getElementById("overlay-img").src = src; fullModal.show(); }
function closeFull() { fullModal.hide(); }

function show(i) {
  idx = i;
  const p = DATA[i];
  document.getElementById("counter").textContent = (i + 1) + " / " + DATA.length;
  document.getElementById("filename").textContent = p.name;
  document.getElementById("img-a").src = p.imgA;
  document.getElementById("img-b").src = p.imgB;
  // 更新像素对比浮层的标签
  var headA = document.querySelector("#card-a .panel-head").textContent.trim();
  var headB = document.querySelector("#card-b .panel-head").textContent.trim();
  document.getElementById("px-la").textContent = headA;
  document.getElementById("px-lb").textContent = headB;
  document.getElementById("img-heatmap").src = p.heatmap;
  document.getElementById("img-amplified").src = p.amplified;
  document.getElementById("img-ssim").src = p.ssim;

  const el = document.getElementById("metrics");
  el.innerHTML = "";
  Object.keys(p.metrics).forEach(function(k) {
    const v = p.metrics[k];
    const d = document.createElement("div");
    d.className = "m-item";
    let tip = TIPS[k] || "";
    if (k.startsWith("Pixel Diff")) tip = "Pixel Difference %\n超过阈值的像素占比，越低越好\n0% = 完全相同";
    const valStr = v === null ? "∞" : (typeof v === "number" ? (Number.isInteger(v) ? v : v.toFixed(4)) : v);
    const cls = gradeMetric(k, v);
    const tipAttr = tip ? ' data-bs-toggle="tooltip" data-bs-placement="top" data-bs-html="true" title="' + tip.replace(/\n/g, "<br>") + '"' : '';
    d.innerHTML = '<span class="m-k"' + tipAttr + '>' + k + '</span><span class="m-v ' + cls + '">' + valStr + '</span>';
    el.appendChild(d);
    if (k === "MAE") { const sep = document.createElement("div"); sep.className = "m-sep"; el.appendChild(sep); }
  });

  document.getElementById("btn-prev").style.display = DATA.length <= 1 ? "none" : "";
  document.getElementById("btn-next").style.display = DATA.length <= 1 ? "none" : "";

  document.querySelectorAll('.m-item [data-bs-toggle="tooltip"]').forEach(function(el) {
    new bootstrap.Tooltip(el, { trigger: "hover", container: "body" });
  });

  // 切换图片后重新缓存像素数据
  if (pixelMode) {
    var imgA = document.getElementById("img-a"), imgB = document.getElementById("img-b");
    imgA.onload = function() { cachePixelData(); };
    imgB.onload = function() { cachePixelData(); };
  }
}

function go(delta) {
  let next = idx + delta;
  if (next < 0) next = DATA.length - 1;
  if (next >= DATA.length) next = 0;
  show(next);
}

document.addEventListener("keydown", function(e) {
  if (document.getElementById("fullModal").classList.contains("show")) {
    if (e.key === "Escape") closeFull();
    return;
  }
  if (e.key === "Escape" && pixelMode) {
    togglePixelMode(document.getElementById("pill-pixel"));
    return;
  }
  if (e.key === "ArrowLeft") go(-1);
  if (e.key === "ArrowRight") go(1);
});

/* ===== 像素对比模式 ===== */
let pixelMode = false;
let savedPanelState = null; // 保存进入像素模式前的面板状态
const cvA = document.createElement("canvas"), ctxA = cvA.getContext("2d", { willReadFrequently: true });
const cvB = document.createElement("canvas"), ctxB = cvB.getContext("2d", { willReadFrequently: true });

function togglePixelMode(btn) {
  pixelMode = !pixelMode;
  btn.classList.toggle("active", pixelMode);
  document.getElementById("pixel-info").classList.remove("visible");
  clearCrosshairs();

  if (pixelMode) {
    // 保存当前所有 pill 的状态
    savedPanelState = {};
    document.querySelectorAll('.pill[data-panel]').forEach(function(p) {
      savedPanelState[p.dataset.panel] = p.classList.contains("active");
    });
    savedPanelState["bot-all"] = document.getElementById("pill-bot-all").classList.contains("active");

    // 只显示原图A和原图B，隐藏其他
    document.querySelectorAll('.pill[data-panel]').forEach(function(p) {
      var shouldOn = (p.dataset.panel === "card-a" || p.dataset.panel === "card-b");
      if (shouldOn) { p.classList.add("active"); } else { p.classList.remove("active"); }
      document.getElementById(p.dataset.panel).style.display = shouldOn ? "" : "none";
    });
    reflowRow("top"); reflowRow("bot");
    syncBotAll(); syncTopAll();
    cachePixelData();
  } else {
    // 恢复之前的面板状态
    if (savedPanelState) {
      document.querySelectorAll('.pill[data-panel]').forEach(function(p) {
        var wasOn = savedPanelState[p.dataset.panel];
        if (wasOn) { p.classList.add("active"); } else { p.classList.remove("active"); }
        document.getElementById(p.dataset.panel).style.display = wasOn ? "" : "none";
      });
      if (savedPanelState["bot-all"]) {
        document.getElementById("pill-bot-all").classList.add("active");
      }
      reflowRow("top"); reflowRow("bot");
      syncBotAll(); syncTopAll();
      savedPanelState = null;
    }
  }
}

function cachePixelData() {
  /* 将当前两张原图绘制到隐藏 canvas 以读取像素 */
  const imgA = document.getElementById("img-a");
  const imgB = document.getElementById("img-b");
  function drawWhenReady(img, cv, ctx) {
    if (!img.naturalWidth) return;
    cv.width = img.naturalWidth; cv.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
  }
  drawWhenReady(imgA, cvA, ctxA);
  drawWhenReady(imgB, cvB, ctxB);
}

/* 坐标转换：鼠标位置 → 原图像素坐标（处理 object-fit: contain） */
function mouseToPixel(e, img) {
  const rect = img.getBoundingClientRect();
  const natW = img.naturalWidth, natH = img.naturalHeight;
  if (!natW || !natH) return null;
  const scale = Math.min(rect.width / natW, rect.height / natH);
  const rendW = natW * scale, rendH = natH * scale;
  const offX = (rect.width - rendW) / 2, offY = (rect.height - rendH) / 2;
  const px = (e.clientX - rect.left - offX) / scale;
  const py = (e.clientY - rect.top - offY) / scale;
  if (px < 0 || py < 0 || px >= natW || py >= natH) return null;
  return { x: Math.floor(px), y: Math.floor(py) };
}

function drawCrosshair(canvasId, wrapId, x, y) {
  const wrap = document.getElementById(wrapId);
  const canvas = document.getElementById(canvasId);
  const img = wrap.querySelector("img");
  const rect = img.getBoundingClientRect();
  const wRect = wrap.getBoundingClientRect();
  canvas.width = wRect.width; canvas.height = wRect.height;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const natW = img.naturalWidth, natH = img.naturalHeight;
  const scale = Math.min(rect.width / natW, rect.height / natH);
  const rendW = natW * scale, rendH = natH * scale;
  const offX = (rect.width - rendW) / 2 + (rect.left - wRect.left);
  const offY = (rect.height - rendH) / 2 + (rect.top - wRect.top);
  const sx = offX + (x + 0.5) * scale;
  const sy = offY + (y + 0.5) * scale;
  ctx.strokeStyle = "rgba(123,147,243,0.7)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx, offY); ctx.lineTo(sx, offY + rendH);
  ctx.moveTo(offX, sy); ctx.lineTo(offX + rendW, sy);
  ctx.stroke();
}

function clearCrosshairs() {
  ["xhair-a", "xhair-b"].forEach(function(id) {
    const c = document.getElementById(id);
    c.getContext("2d").clearRect(0, 0, c.width, c.height);
  });
  document.getElementById("mag-a").style.display = "none";
  document.getElementById("mag-b").style.display = "none";
}

var MAG_ZOOM = 8;   // 放大倍数
var MAG_RADIUS = 60; // 放大镜半径 px

function drawMagnifier(magId, magCvId, srcCtx, imgEl, wrapId, px, py) {
  const mag = document.getElementById(magId);
  const magCv = document.getElementById(magCvId);
  const wrap = document.getElementById(wrapId);
  const img = imgEl;
  const rect = img.getBoundingClientRect();
  const wRect = wrap.getBoundingClientRect();
  const natW = img.naturalWidth, natH = img.naturalHeight;
  if (!natW) { mag.style.display = "none"; return; }
  const scale = Math.min(rect.width / natW, rect.height / natH);
  const offX = (rect.width - natW * scale) / 2 + (rect.left - wRect.left);
  const offY = (rect.height - natH * scale) / 2 + (rect.top - wRect.top);
  // 放大镜在图上的屏幕坐标
  const sx = offX + (px + 0.5) * scale;
  const sy = offY + (py + 0.5) * scale;
  // 定位放大镜（偏移到右上方避免遮挡鼠标）
  var magX = sx + 20, magY = sy - MAG_RADIUS * 2 - 10;
  if (magY < 0) magY = sy + 20;
  if (magX + MAG_RADIUS * 2 > wRect.width) magX = sx - MAG_RADIUS * 2 - 20;
  mag.style.left = magX + "px";
  mag.style.top = magY + "px";
  mag.style.display = "block";
  // 绘制放大区域
  var sampleR = Math.floor(MAG_RADIUS / MAG_ZOOM);
  var srcX = px - sampleR, srcY = py - sampleR, srcW = sampleR * 2 + 1, srcH = sampleR * 2 + 1;
  magCv.width = MAG_RADIUS * 2; magCv.height = MAG_RADIUS * 2;
  var mctx = magCv.getContext("2d");
  mctx.imageSmoothingEnabled = false;
  // 先填黑（越界区域）
  mctx.fillStyle = "#000";
  mctx.fillRect(0, 0, magCv.width, magCv.height);
  // 从缓存 canvas 取像素块，放大绘制
  var drawSrcX = Math.max(0, srcX), drawSrcY = Math.max(0, srcY);
  var drawW = Math.min(srcW, natW - drawSrcX), drawH = Math.min(srcH, natH - drawSrcY);
  if (drawW > 0 && drawH > 0) {
    var destX = (drawSrcX - srcX) * MAG_ZOOM;
    var destY = (drawSrcY - srcY) * MAG_ZOOM;
    mctx.drawImage(srcCtx.canvas, drawSrcX, drawSrcY, drawW, drawH, destX, destY, drawW * MAG_ZOOM, drawH * MAG_ZOOM);
  }
  // 画中心十字
  mctx.strokeStyle = "rgba(255,255,255,0.5)";
  mctx.lineWidth = 1;
  var cx = MAG_RADIUS, cy = MAG_RADIUS;
  mctx.beginPath();
  mctx.moveTo(cx - 6, cy); mctx.lineTo(cx + 6, cy);
  mctx.moveTo(cx, cy - 6); mctx.lineTo(cx, cy + 6);
  mctx.stroke();
}

function getPixel(ctx, x, y) {
  try {
    const d = ctx.getImageData(x, y, 1, 1).data;
    return { r: d[0], g: d[1], b: d[2], a: d[3] };
  } catch(e) { return { r: 0, g: 0, b: 0, a: 0 }; }
}

function fmtPx(p) { return "R:" + p.r + " G:" + p.g + " B:" + p.b + " A:" + p.a; }

function onPixelMove(e, which) {
  if (!pixelMode) return;
  const img = document.getElementById("img-" + which);
  const pt = mouseToPixel(e, img);
  if (!pt) { document.getElementById("pixel-info").classList.remove("visible"); clearCrosshairs(); return; }
  const pa = getPixel(ctxA, pt.x, pt.y);
  const pb = getPixel(ctxB, pt.x, pt.y);
  document.getElementById("px-coord").textContent = "(" + pt.x + ", " + pt.y + ")";
  document.getElementById("px-v-a").textContent = fmtPx(pa);
  document.getElementById("px-v-b").textContent = fmtPx(pb);
  document.getElementById("px-v-d").textContent = "R:" + Math.abs(pa.r-pb.r) + " G:" + Math.abs(pa.g-pb.g) + " B:" + Math.abs(pa.b-pb.b) + " A:" + Math.abs(pa.a-pb.a);
  document.getElementById("px-sw-a").style.background = "rgb(" + pa.r + "," + pa.g + "," + pa.b + ")";
  document.getElementById("px-sw-b").style.background = "rgb(" + pb.r + "," + pb.g + "," + pb.b + ")";
  document.getElementById("pixel-info").classList.add("visible");
  drawCrosshair("xhair-a", "wrap-a", pt.x, pt.y);
  drawCrosshair("xhair-b", "wrap-b", pt.x, pt.y);
  drawMagnifier("mag-a", "mag-cv-a", ctxA, document.getElementById("img-a"), "wrap-a", pt.x, pt.y);
  drawMagnifier("mag-b", "mag-cv-b", ctxB, document.getElementById("img-b"), "wrap-b", pt.x, pt.y);
}

function onPixelLeave() {
  document.getElementById("pixel-info").classList.remove("visible");
  clearCrosshairs();
}

/* 绑定事件到两张原图 */
document.getElementById("wrap-a").addEventListener("mousemove", function(e) { onPixelMove(e, "a"); });
document.getElementById("wrap-b").addEventListener("mousemove", function(e) { onPixelMove(e, "b"); });
document.getElementById("wrap-a").addEventListener("mouseleave", onPixelLeave);
document.getElementById("wrap-b").addEventListener("mouseleave", onPixelLeave);

/* ===== 拖拽分割条 ===== */
(function() {
  const splitter = document.getElementById("splitter");
  const rowTop = document.getElementById("row-top");
  const rowBot = document.getElementById("row-bot");
  let dragging = false, startY, startTopH, totalH;

  splitter.addEventListener("mousedown", function(e) {
    if (splitter.classList.contains("hidden")) return;
    e.preventDefault();
    dragging = true;
    startY = e.clientY;
    startTopH = rowTop.offsetHeight;
    totalH = rowTop.offsetHeight + rowBot.offsetHeight;
    splitter.classList.add("active");
    document.body.classList.add("resizing");
  });

  document.addEventListener("mousemove", function(e) {
    if (!dragging) return;
    const dy = e.clientY - startY;
    let newTopH = Math.max(60, Math.min(totalH - 60, startTopH + dy));
    rowTop.style.flex = "0 0 " + newTopH + "px";
    rowBot.style.flex = "0 0 " + (totalH - newTopH) + "px";
  });

  document.addEventListener("mouseup", function() {
    if (dragging) {
      dragging = false;
      splitter.classList.remove("active");
      document.body.classList.remove("resizing");
    }
  });

  function initSplit() {
    rowTop.style.flex = "1";
    rowBot.style.flex = "1";
  }
  initSplit();
  window.addEventListener("resize", initSplit);
})();
</script>
